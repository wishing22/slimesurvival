  document.getElementById('hpFill').style.background=pct>0.5?'#1D9E75':pct>0.25?'#EF9F27':'#D85A30';
}

// ---- RENDER ----
function render(){
  ctx.clearRect(0,0,W(),H());
  ctx.save();
  if(G&&G.shakeTimer>0){
    const s=G.shakeTimer*0.6;
    ctx.translate(rnd(-s,s),rnd(-s,s));
  }
  drawBg();
  if(!G) return;
  // Absolute Zero white flash overlay
  if(G.flashTimer>0){
    ctx.save();
    ctx.globalAlpha=Math.min(1, G.flashTimer/15)*0.85;
    ctx.fillStyle='#c8eeff';
    ctx.fillRect(0,0,W(),H());
    ctx.restore();
  }
  G.orbs.forEach(drawOrb);
  G.hearts.forEach(drawHeart);
  G.particles.filter(p=>p.type==='wind').forEach(drawWindParticle);
  G.projs.filter(p=>p.type==='wind').forEach(drawWindRing);
  G.projs.filter(p=>p.type!=='wind').forEach(drawProj);
  G.particles.filter(p=>p.type!=='wind').forEach(drawParticle);
  G.enemies.forEach(drawEnemy);
  drawPlayer();
  G.texts.forEach(drawText);
  ctx.restore();
  if(paused) drawPauseDim();
}

function drawPauseDim(){
  ctx.save();ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(0,0,W(),H());ctx.restore();
}

function drawBg(){
  ctx.fillStyle='#0f0f1e';ctx.fillRect(0,0,W(),H());
  ctx.strokeStyle='rgba(127,119,221,0.05)';ctx.lineWidth=0.5;
  const gs=52;
  for(let x=0;x<W();x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H());ctx.stroke();}
  for(let y=0;y<H();y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W(),y);ctx.stroke();}
}

// ---- PLAYER DRAW ----
function drawPlayer(){
  const p=G.p;
  const bob=Math.sin(p.wobble)*2.8;
  const sqX=1+Math.sin(p.wobble*1.8)*0.06;
  const sqY=1/sqX;

  // draw weapons behind player
  p.weapons.forEach(w=>drawWeapon(w));

  ctx.save();
  ctx.translate(p.x,p.y+bob);
  if(p.invTimer>0&&Math.floor(p.invTimer/4)%2===0) ctx.globalAlpha=0.3;

  // shadow
  ctx.beginPath();ctx.ellipse(0,p.r,p.r*sqX*1.1,5,0,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fill();

  // regen aura (behind body)
  if(p.regenRate>0){
    ctx.save();
    ctx.globalAlpha=0.18+Math.sin(p.wobble*2)*0.08;
    ctx.beginPath();ctx.ellipse(0,0,p.r*1.55,p.r*1.45,0,0,Math.PI*2);
    ctx.fillStyle='#1D9E75';ctx.fill();
    ctx.restore();
  }

  ctx.scale(sqX,sqY);

  // UNIQUE PLAYER — deep indigo/violet slime with crystal pattern
  // outer body
  ctx.beginPath();ctx.ellipse(0,0,p.r,p.r*0.92,0,0,Math.PI*2);
  ctx.fillStyle='#2d1b6e';ctx.fill(); // deep indigo base

  // crystal facet 1
  ctx.beginPath();ctx.moveTo(0,-p.r*0.9);ctx.lineTo(p.r*0.55,-p.r*0.1);
  ctx.lineTo(p.r*0.2,p.r*0.7);ctx.lineTo(-p.r*0.2,p.r*0.7);
  ctx.lineTo(-p.r*0.55,-p.r*0.1);ctx.closePath();
  ctx.fillStyle='#4a2fa0';ctx.fill();

  // crystal facet 2 (lighter highlight)
  ctx.beginPath();ctx.moveTo(0,-p.r*0.85);ctx.lineTo(p.r*0.3,-p.r*0.05);
  ctx.lineTo(0,p.r*0.3);ctx.lineTo(-p.r*0.3,-p.r*0.05);ctx.closePath();
  ctx.fillStyle='#7055cc';ctx.fill();

  // inner glow core
  ctx.beginPath();ctx.ellipse(0,-p.r*0.05,p.r*0.38,p.r*0.32,0,0,Math.PI*2);
  ctx.fillStyle='rgba(160,120,255,0.55)';ctx.fill();

  // crown points (3 small spikes on top)
  for(let i=-1;i<=1;i++){
    ctx.beginPath();
    ctx.moveTo(i*p.r*0.32,-p.r*0.78);
    ctx.lineTo(i*p.r*0.32-p.r*0.1,-p.r*0.55);
    ctx.lineTo(i*p.r*0.32+p.r*0.1,-p.r*0.55);
    ctx.closePath();
    ctx.fillStyle='#c4a0ff';ctx.fill();
  }

  // shine
  ctx.beginPath();ctx.ellipse(-p.r*0.22,-p.r*0.32,p.r*0.2,p.r*0.12,-0.5,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.45)';ctx.fill();

  // eyes — larger, more dramatic
  const er=p.r*0.21,eo=p.r*0.3,ed=0.3;
  [[-1],[1]].forEach(([side])=>{
    // eye white
    ctx.beginPath();ctx.ellipse(side*eo,-p.r*0.08,er*1.1,er,0,0,Math.PI*2);
    ctx.fillStyle='#e8e0ff';ctx.fill();
    // pupil
    ctx.beginPath();ctx.ellipse(
      side*eo+Math.cos(p.eyeDir)*ed*er,
      -p.r*0.08+Math.sin(p.eyeDir)*ed*er,
      er*0.55,er*0.65,0,0,Math.PI*2);
    ctx.fillStyle='#1a0a3a';ctx.fill();
    // pupil shine
    ctx.beginPath();ctx.ellipse(
      side*eo+Math.cos(p.eyeDir)*ed*er-er*0.18,
      -p.r*0.08+Math.sin(p.eyeDir)*ed*er-er*0.22,
      er*0.18,er*0.14,0,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.8)';ctx.fill();
  });

  ctx.restore();
}

// ---- WEAPON DRAW — clock-hand style ----
function drawWeapon(w){
  if(w.cx===undefined) return;
  const p=G.p;
  const angle=w.orbitAngle;
  ctx.save();
  ctx.translate(p.x,p.y);
  ctx.rotate(angle);
  const orbitR=44+p.weapons.length*5;

  if(w.type==='spear'){
    // spear: long needle pointing outward from center
    ctx.strokeStyle='#c8c0f0';ctx.lineWidth=3;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(orbitR-18,0);ctx.lineTo(orbitR+18,0);ctx.stroke();
    // tip
    ctx.fillStyle='#7F77DD';
    ctx.beginPath();ctx.moveTo(orbitR+14,-4);ctx.lineTo(orbitR+14,4);ctx.lineTo(orbitR+26,0);ctx.closePath();ctx.fill();
    // gem at handle
    ctx.beginPath();ctx.arc(orbitR-18,0,4,0,Math.PI*2);
    ctx.fillStyle='#AFA9EC';ctx.fill();
  } else {
    // sword: blade radiates outward from orbit position, like a clock hand pointing away from center
    // draw blade aligned along the radius (pointing away from player center)
    ctx.save();
    ctx.translate(orbitR,0);
    // blade
    ctx.fillStyle='#dde8f5';
    ctx.beginPath();ctx.moveTo(-4,-2);ctx.lineTo(16,-2);ctx.lineTo(18,0);ctx.lineTo(16,2);ctx.lineTo(-4,2);ctx.closePath();ctx.fill();
    // fuller (groove)
    ctx.strokeStyle='rgba(180,200,230,0.6)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(-2,0);ctx.lineTo(14,0);ctx.stroke();
    // tip highlight
    ctx.fillStyle='#ffffff';
    ctx.beginPath();ctx.moveTo(14,-1.5);ctx.lineTo(18,0);ctx.lineTo(14,1.5);ctx.closePath();ctx.fill();
    // guard
    ctx.fillStyle='#FFD700';
    ctx.beginPath();ctx.moveTo(-4,-6);ctx.lineTo(-4,6);ctx.lineTo(-8,5);ctx.lineTo(-9,0);ctx.lineTo(-8,-5);ctx.closePath();ctx.fill();
    // handle
    ctx.fillStyle='#6b3a1a';
    ctx.fillRect(-14,-2.5,6,5);
    // pommel
    ctx.beginPath();ctx.arc(-14,0,3.5,0,Math.PI*2);
    ctx.fillStyle='#cc9933';ctx.fill();
    ctx.restore();
  }
  ctx.restore();
}

// ---- ENEMY DRAW ----
function drawEnemy(e){
  ctx.save();
  const frozen=e.freezeTimer>0;
  ctx.translate(e.x,e.y+Math.sin(e.wobble)*2);
  if(e.hitFlash>0) ctx.globalAlpha=0.4+Math.sin(e.hitFlash*1.2)*0.6;
  const r=e.r;

  // freeze tint overlay
  let col=e.col;
  if(frozen) col='#a8d8f0';

  ctx.fillStyle=col;
  if(e.type==='bat'){
    [[-1],[1]].forEach(([s])=>{
      ctx.beginPath();ctx.moveTo(s*r*0.4,0);
      ctx.quadraticCurveTo(s*r*1.1,-r,s*r*1.4,r*0.1);
      ctx.quadraticCurveTo(s*r*0.9,r*0.3,s*r*0.4,0);ctx.fill();
    });
    ctx.beginPath();ctx.ellipse(0,0,r*0.42,r*0.65,0,0,Math.PI*2);ctx.fill();
  } else if(e.type==='ghost'){
    ctx.globalAlpha*=0.72;
    ctx.beginPath();ctx.arc(0,-r*0.05,r*0.9,Math.PI,0);
    ctx.lineTo(r*0.9,r*0.55);ctx.quadraticCurveTo(r*0.6,r,0,r*0.5);
    ctx.quadraticCurveTo(-r*0.6,r,-r*0.9,r*0.55);ctx.closePath();ctx.fill();
  } else if(e.type==='boss'){
    ctx.beginPath();ctx.ellipse(0,0,r,r*0.9,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,100,30,0.5)';
    for(let i=0;i<6;i++){
      const a=(Math.PI*2/6)*i+e.wobble*0.25;
      ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,r*1.35,a,a+0.28);ctx.closePath();ctx.fill();
    }
  } else if(e.type==='eliteBoss'){
    // armoured knight — dark red with spiked shell
    ctx.beginPath();ctx.ellipse(0,0,r,r*0.9,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(60,0,0,0.7)';
    for(let i=0;i<8;i++){
      const a=(Math.PI*2/8)*i+e.wobble*0.1;
      ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,r*1.25,a,a+0.25);ctx.closePath();ctx.fill();
    }
    ctx.strokeStyle='#cc2200';ctx.lineWidth=2;
    ctx.beginPath();ctx.ellipse(0,0,r,r*0.9,0,0,Math.PI*2);ctx.stroke();
  } else if(e.type==='megaBoss'){
    // giant destroyer — deep purple/black with pulsing aura
    const pulse=1+Math.sin(e.wobble*1.5)*0.04;
    ctx.save();ctx.scale(pulse,pulse);
    ctx.fillStyle='#0d0020';
    ctx.beginPath();ctx.ellipse(0,0,r,r*0.88,0,0,Math.PI*2);ctx.fill();
    // void tendrils
    ctx.fillStyle='rgba(80,0,180,0.5)';
    for(let i=0;i<10;i++){
      const a=(Math.PI*2/10)*i+e.wobble*0.15;
      ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,r*1.4,a,a+0.22);ctx.closePath();ctx.fill();
    }
    // inner core glow
    ctx.fillStyle='rgba(160,0,255,0.6)';
    ctx.beginPath();ctx.ellipse(0,0,r*0.55,r*0.5,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(220,180,255,0.8)';
    ctx.beginPath();ctx.ellipse(0,0,r*0.28,r*0.25,0,0,Math.PI*2);ctx.fill();
    ctx.restore();
  } else {
    // slime, bat, skeleton, ghost — catch-all for basic enemies
    ctx.beginPath();ctx.ellipse(0,0,r,r*0.85,0,0,Math.PI*2);ctx.fill();
    if(e.type==='skeleton'){
      ctx.strokeStyle='rgba(200,210,190,0.35)';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(-r*0.3,-r*0.55);ctx.lineTo(-r*0.3,r*0.55);ctx.stroke();
      ctx.beginPath();ctx.moveTo(r*0.3,-r*0.55);ctx.lineTo(r*0.3,r*0.55);ctx.stroke();
    }
  }

  // freeze crystal overlay
  if(frozen){
    ctx.globalAlpha=0.5+Math.sin(e.wobble*3)*0.1;
    ctx.strokeStyle='#cce8ff';ctx.lineWidth=1.5;
    for(let i=0;i<4;i++){
      const a=(Math.PI/4)+i*(Math.PI/2);
      ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(a)*r*1.2,Math.sin(a)*r*1.2);ctx.stroke();
    }
  }

  ctx.globalAlpha=1;
  if(e.hp<e.maxHp){
    const bw=r*2.2,bh=3.5,bx=-r*1.1,by=-r-9;
    ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(bx,by,bw,bh);
    ctx.fillStyle=e.hp/e.maxHp>0.5?'#1D9E75':'#D85A30';
    ctx.fillRect(bx,by,(e.hp/e.maxHp)*bw,bh);
  }
  const er2=r*0.2,eo2=r*0.27;
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(-eo2,-r*0.08,er2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(eo2,-r*0.08,er2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#111';
  ctx.beginPath();ctx.arc(-eo2,-r*0.08,er2*0.55,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(eo2,-r*0.08,er2*0.55,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

// ---- PROJECTILE DRAW ----
function drawProj(pr){
  if(pr.type==='wind') return;

  // tornado hazard zone
  if(pr.type==='tornado'){
    ctx.save();
    const spin=pr.spinAngle||pr.life*0.04;
    const alpha=Math.min(0.7, pr.life/120)*0.8;
    ctx.globalAlpha=alpha;
    const col=pr.electric?'rgba(160,210,255,':'rgba(180,230,255,';
    for(let i=0;i<4;i++){
      const a=spin+i*(Math.PI/2);
      const sr=pr.radius*(0.28+i*0.24);
      ctx.strokeStyle=`${col}${0.9-i*0.18})`;
      ctx.lineWidth=4-i*0.7;
      ctx.beginPath();ctx.arc(pr.cx,pr.cy,sr,a,a+Math.PI*1.6);ctx.stroke();
    }
    if(pr.electric){
      ctx.globalAlpha=alpha*0.6;
      ctx.strokeStyle='rgba(220,240,255,0.9)';ctx.lineWidth=1.5;
      for(let i=0;i<3;i++){
        const a=spin*1.5+i*(Math.PI*2/3);
        ctx.beginPath();ctx.moveTo(pr.cx,pr.cy);
        ctx.lineTo(pr.cx+Math.cos(a)*pr.radius,pr.cy+Math.sin(a)*pr.radius);ctx.stroke();
      }
    }
    ctx.globalAlpha=alpha*0.5;
    ctx.fillStyle=pr.electric?'rgba(180,220,255,0.8)':'rgba(200,240,255,0.8)';
    ctx.beginPath();ctx.arc(pr.cx,pr.cy,6,0,Math.PI*2);ctx.fill();
    ctx.restore(); return;
  }

  // fire zone (meteor crater)
  if(pr.type==='fireZone'){
    ctx.save();
    const alpha=Math.min(0.6,pr.life/60)*0.7;
    ctx.globalAlpha=alpha;
    ctx.fillStyle='rgba(255,80,0,0.25)';
    ctx.beginPath();ctx.arc(pr.cx,pr.cy,pr.radius,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(255,140,0,0.6)';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(pr.cx,pr.cy,pr.radius,0,Math.PI*2);ctx.stroke();
    // fire flicker dots
    for(let i=0;i<5;i++){
      const a=pr.life*0.05+i*(Math.PI*2/5);
      const fr=rnd(pr.radius*0.2,pr.radius*0.8);
      ctx.fillStyle=`rgba(255,${100+Math.floor(rnd(0,100))},0,0.7)`;
      ctx.beginPath();ctx.arc(pr.cx+Math.cos(a)*fr,pr.cy+Math.sin(a)*fr,rnd(3,6),0,Math.PI*2);ctx.fill();
    }
    ctx.restore(); return;
  }

  // ice shockwave ring (Absolute Zero)
  if(pr.type==='iceShockwave'){
    if((pr.delay||0)>0) return;
    ctx.save();
    const fade=Math.max(0, pr.life/(pr.maxLife||50));
    ctx.globalAlpha=fade*0.9;
    ctx.strokeStyle=pr.col||'rgba(160,220,255,0.9)';
    ctx.lineWidth=6+fade*8;
    ctx.beginPath();ctx.arc(pr.cx,pr.cy,Math.max(0,pr.radius),0,Math.PI*2);ctx.stroke();
    // bright inner edge
    ctx.globalAlpha=fade*0.5;
    ctx.strokeStyle='rgba(255,255,255,0.95)';
    ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(pr.cx,pr.cy,Math.max(0,pr.radius-4),0,Math.PI*2);ctx.stroke();
    ctx.restore(); return;
  }
  if(pr.type==='stormCloud'){
    ctx.save();
    const fade=Math.min(1, pr.life/30);
    const t2=Date.now()*0.003;
    ctx.globalAlpha=fade*0.38;
    ctx.fillStyle=pr.mega?'rgba(40,0,80,0.7)':'rgba(10,10,50,0.65)';
    ctx.beginPath();ctx.arc(pr.cx,pr.cy,pr.radius,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=fade*0.65;
    ctx.strokeStyle=pr.mega?'rgba(180,100,255,0.8)':'rgba(100,140,255,0.7)';
    ctx.lineWidth=2.5;
    ctx.beginPath();ctx.arc(pr.cx,pr.cy,pr.radius,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=fade*0.48;
    for(let i=0;i<(pr.mega?8:4);i++){
      const a=t2*1.4+i*(Math.PI*2/(pr.mega?8:4));
      const sr=pr.radius*(0.3+0.5*((i%3)/3));
      ctx.strokeStyle=pr.mega?'rgba(220,160,255,0.6)':'rgba(140,180,255,0.6)';
      ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(pr.cx,pr.cy,sr,a,a+1.0);ctx.stroke();
    }
    const flashPulse=0.5+0.5*Math.sin(t2*8);
    ctx.globalAlpha=fade*flashPulse*0.75;
    ctx.fillStyle=pr.mega?'rgba(200,150,255,0.9)':'rgba(180,210,255,0.9)';
    ctx.beginPath();ctx.arc(pr.cx,pr.cy,8+flashPulse*5,0,Math.PI*2);ctx.fill();
    ctx.restore(); return;
  }

  // bolt flash — bright starburst at strike location
  if(pr.type==='boltFlash'){
    ctx.save();
    const f=pr.life/pr.maxLife;
    ctx.globalAlpha=f*0.55;
    ctx.fillStyle=pr.glow||'rgba(255,220,80,0.5)';
    ctx.beginPath();ctx.arc(pr.x,pr.y,32*f,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=f;
    ctx.fillStyle=pr.col||'#FFE94D';
    ctx.beginPath();ctx.arc(pr.x,pr.y,10*f,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=pr.col||'#FFE94D';
    ctx.lineWidth=2;
    for(let i=0;i<8;i++){
      const a=(Math.PI/4)*i;
      ctx.beginPath();ctx.moveTo(pr.x,pr.y);
      ctx.lineTo(pr.x+Math.cos(a)*(22*f), pr.y+Math.sin(a)*(22*f));
      ctx.stroke();
    }
    // jagged bolt line from above
    ctx.globalAlpha=f*0.9;
    ctx.strokeStyle=pr.col||'#FFE94D';
    ctx.lineWidth=3;
    ctx.beginPath();
    let bx=pr.x, by=pr.y-130;
    ctx.moveTo(bx,by);
    for(let s=0;s<7;s++){ bx+=rnd(-20,20); by+=19; ctx.lineTo(bx,by); }
    ctx.lineTo(pr.x,pr.y);
    ctx.stroke();
    ctx.globalAlpha=f*0.55;
    ctx.strokeStyle='#ffffff'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.restore(); return;
  }

  // bolt chain — zigzag arc between chained enemies
  if(pr.type==='boltChain'){
    ctx.save();
    const f=pr.life/pr.maxLife;
    ctx.globalAlpha=f*0.9;
    ctx.strokeStyle=pr.col||'#AAD4FF';
    ctx.lineWidth=2.5;
    ctx.beginPath();
    ctx.moveTo(pr.x1,pr.y1);
    for(let s=1;s<=5;s++){
      const t=s/5;
      ctx.lineTo(lerp(pr.x1,pr.x2,t)+rnd(-16,16), lerp(pr.y1,pr.y2,t)+rnd(-16,16));
    }
    ctx.lineTo(pr.x2,pr.y2);
    ctx.stroke();
    ctx.globalAlpha=f*0.4;
    ctx.strokeStyle='#ffffff'; ctx.lineWidth=1; ctx.stroke();
    ctx.restore(); return;
  }

  // storm bolt (legacy)
  if(pr.type==='stormBolt'){
    ctx.save(); ctx.globalAlpha=0.8;
    ctx.strokeStyle='rgba(220,240,255,0.9)';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(pr.x,pr.y);ctx.lineTo(pr.tx||pr.x,pr.ty||pr.y);ctx.stroke();
    ctx.restore(); return;
  }

  // blizzard aura (persistent frost ground around player)
  if(pr.type==='blizzardAura'){
    const pp=G.p;
    ctx.save();
    // icy ground fill
    ctx.globalAlpha=0.28;
    const grad=ctx.createRadialGradient(pp.x,pp.y,0,pp.x,pp.y,pr.r);
    grad.addColorStop(0,'rgba(200,235,255,0.6)');
    grad.addColorStop(0.6,'rgba(140,210,255,0.35)');
    grad.addColorStop(1,'rgba(100,180,255,0)');
    ctx.fillStyle=grad;
    ctx.beginPath();ctx.arc(pp.x,pp.y,pr.r,0,Math.PI*2);ctx.fill();
    // spinning crystal arms
    ctx.globalAlpha=0.5;
    ctx.strokeStyle='rgba(200,240,255,0.7)';ctx.lineWidth=1.2;
    for(let i=0;i<12;i++){
      const a=pr.spinAngle+(Math.PI/6)*i;
      const len=pr.r*(0.35+0.45*((i%2)===0?1:0.6));
      ctx.beginPath();
      ctx.moveTo(pp.x+Math.cos(a)*pr.r*0.12, pp.y+Math.sin(a)*pr.r*0.12);
      ctx.lineTo(pp.x+Math.cos(a)*len, pp.y+Math.sin(a)*len);
      ctx.stroke();
      // branch ticks at midpoint
      const mx=pp.x+Math.cos(a)*len*0.55, my=pp.y+Math.sin(a)*len*0.55;
      ctx.beginPath();
      ctx.moveTo(mx+Math.cos(a+Math.PI/2)*10, my+Math.sin(a+Math.PI/2)*10);
      ctx.lineTo(mx+Math.cos(a-Math.PI/2)*10, my+Math.sin(a-Math.PI/2)*10);
      ctx.stroke();
    }
    // orbiting snow dots
    ctx.globalAlpha=0.6;
    for(let i=0;i<16;i++){
      const a=pr.spinAngle*1.8+(Math.PI*2/16)*i;
      const dr=pr.r*(0.45+0.38*Math.sin(pr.spinAngle*1.2+i*0.8));
      ctx.fillStyle='rgba(220,245,255,0.8)';
      ctx.beginPath();ctx.arc(pp.x+Math.cos(a)*dr, pp.y+Math.sin(a)*dr, 2,0,Math.PI*2);ctx.fill();
    }
    // edge ring
    ctx.globalAlpha=0.3;
    ctx.strokeStyle='rgba(160,220,255,0.8)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(pp.x,pp.y,pr.r,0,Math.PI*2);ctx.stroke();
    ctx.restore(); return;
  }

  ctx.save();ctx.translate(pr.x,pr.y);

  if(pr.type==='meteor'){
    // rocky boulder with fire trail
    const angle=Math.atan2(pr.vy,pr.vx);
    ctx.save();ctx.rotate(angle);
    // trail
    ctx.fillStyle='rgba(255,120,0,0.15)';
    ctx.beginPath();ctx.ellipse(-pr.r*1.8,0,pr.r*2,pr.r*0.8,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,60,0,0.25)';
    ctx.beginPath();ctx.ellipse(-pr.r*1.2,0,pr.r*1.3,pr.r*0.6,0,0,Math.PI*2);ctx.fill();
    ctx.restore();
    // rock body
    ctx.fillStyle=pr.mega?'#5a2a00':'#3a2000';
    ctx.beginPath();ctx.arc(0,0,pr.r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=pr.mega?'#8b4a10':'#6b3a10';
    ctx.beginPath();ctx.arc(-pr.r*0.2,-pr.r*0.2,pr.r*0.7,0,Math.PI*2);ctx.fill();
    // fire corona
    ctx.fillStyle='rgba(255,140,0,0.55)';
    ctx.beginPath();ctx.arc(0,0,pr.r*1.4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,220,50,0.4)';
    ctx.beginPath();ctx.arc(0,0,pr.r*0.9,0,Math.PI*2);ctx.fill();
    if(pr.mega){
      ctx.strokeStyle='rgba(255,60,0,0.8)';ctx.lineWidth=2;
      for(let i=0;i<6;i++){
        const a=(Math.PI/3)*i;
        ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(a)*pr.r*1.6,Math.sin(a)*pr.r*1.6);ctx.stroke();
      }
    }
  } else if(pr.type==='fireball'){
    ctx.fillStyle='rgba(239,120,20,0.25)';ctx.beginPath();ctx.arc(0,0,pr.r*2.2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(239,159,39,0.5)';ctx.beginPath();ctx.arc(0,0,pr.r*1.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#EF9F27';ctx.beginPath();ctx.arc(0,0,pr.r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,230,120,0.9)';ctx.beginPath();ctx.arc(-pr.r*0.3,-pr.r*0.3,pr.r*0.4,0,Math.PI*2);ctx.fill();
    if(pr.splashR){
      ctx.strokeStyle='rgba(239,159,39,0.12)';ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(0,0,pr.splashR,0,Math.PI*2);ctx.stroke();
    }
  } else if(pr.type==='ice'){
    ctx.fillStyle='rgba(100,180,255,0.2)';ctx.beginPath();ctx.arc(0,0,pr.r*1.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#85B7EB';ctx.beginPath();ctx.arc(0,0,pr.r,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#dff0ff';ctx.lineWidth=1;
    for(let i=0;i<6;i++){const a=(Math.PI/3)*i;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(a)*pr.r,Math.sin(a)*pr.r);ctx.stroke();}
    ctx.fillStyle='rgba(255,255,255,0.7)';ctx.beginPath();ctx.arc(-pr.r*0.25,-pr.r*0.25,pr.r*0.3,0,Math.PI*2);ctx.fill();
  } else if(pr.type==='blizzard'){
    // larger, more dramatic ice shard
    ctx.fillStyle='rgba(160,220,255,0.3)';ctx.beginPath();ctx.arc(0,0,pr.r*1.6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#b0e0ff';ctx.beginPath();ctx.arc(0,0,pr.r,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#ffffff';ctx.lineWidth=1.5;
    for(let i=0;i<8;i++){const a=(Math.PI/4)*i;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(a)*pr.r,Math.sin(a)*pr.r);ctx.stroke();}
    // cross
    ctx.strokeStyle='rgba(200,240,255,0.8)';ctx.lineWidth=1;
    for(let i=0;i<4;i++){const a=(Math.PI/8)+i*(Math.PI/4);const mid=pr.r*0.6;ctx.beginPath();ctx.moveTo(Math.cos(a)*mid,Math.sin(a)*mid);ctx.lineTo(Math.cos(a)*(mid+pr.r*0.35),Math.sin(a)*(mid+pr.r*0.35));ctx.stroke();}
    ctx.fillStyle='rgba(255,255,255,0.9)';ctx.beginPath();ctx.arc(0,0,pr.r*0.3,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}

function drawWindRing(pr){
  if(pr.type!=='wind') return;
  ctx.save();
  ctx.globalAlpha=(pr.life/20)*0.55;
  ctx.strokeStyle='rgba(180,230,255,0.8)';
  ctx.lineWidth=3+pr.radius/20;
  ctx.beginPath();ctx.arc(pr.cx,pr.cy,pr.radius,0,Math.PI*2);ctx.stroke();
  // inner ring
  ctx.globalAlpha*=0.4;
  ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(pr.cx,pr.cy,pr.radius*0.6,0,Math.PI*2);ctx.stroke();
  ctx.restore();
}

function drawWindParticle(pt){
  ctx.save();
  ctx.globalAlpha=Math.max(0,pt.life/45)*0.7;
  ctx.fillStyle=pt.col;
  ctx.beginPath();ctx.arc(pt.x,pt.y,Math.max(0.5,pt.r*(pt.life/45)),0,Math.PI*2);ctx.fill();
  ctx.restore();
}

// ---- HEART DRAW (animated) ----
function drawHeart(h){
  ctx.save();
  ctx.translate(h.x,h.y+Math.sin(h.wobble)*3);
  // glow ring animation
  const glowAlpha=0.15+Math.sin(h.wobble*3)*0.1;
  ctx.globalAlpha=glowAlpha;
  ctx.fillStyle=h.big?'#ff3366':'#ff6b8a';
  ctx.beginPath();ctx.arc(0,0,h.r*2.2,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;

  const pulse=1+Math.sin(h.wobble*2.8)*0.1;
  ctx.scale(pulse,pulse);
  if(h.life<3) ctx.globalAlpha=h.life/3;

  const r=h.r;
  const col=h.big?'#ff3366':'#ff6b8a';
  const inner=h.big?'#ff99bb':'#ffb3c6';

  // heart shape
  ctx.beginPath();
  ctx.moveTo(0,r*0.3);
  ctx.bezierCurveTo(r*0.5,-r*0.5,r*1.2,r*0.1,r*0.6,r*0.8);
  ctx.bezierCurveTo(r*0.3,r*1.2,0,r*1.1,0,r*0.9);
  ctx.bezierCurveTo(0,r*1.1,-r*0.3,r*1.2,-r*0.6,r*0.8);
  ctx.bezierCurveTo(-r*1.2,r*0.1,-r*0.5,-r*0.5,0,r*0.3);
  ctx.closePath();
  ctx.fillStyle=col;ctx.fill();
  // shine
  ctx.beginPath();ctx.ellipse(-r*0.2,-r*0.05,r*0.22,r*0.13,-0.5,0,Math.PI*2);
  ctx.fillStyle=inner;ctx.fill();
  // spin particles around the heart
  for(let i=0;i<4;i++){
    const a=h.wobble*2+(Math.PI/2)*i;
    ctx.beginPath();ctx.arc(Math.cos(a)*r*1.6,Math.sin(a)*r*1.4,r*0.18,0,Math.PI*2);
    ctx.fillStyle='rgba(255,200,220,0.5)';ctx.fill();
  }
  if(h.big){
    ctx.fillStyle='rgba(255,255,255,0.9)';
    ctx.font='bold 9px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('+35',0,r*0.52);
  }
  ctx.restore();
}

// ---- ORB DRAW (animated) ----
function drawOrb(o){
  ctx.save();
  o.wobble=(o.wobble||0)+0.05;
  const bob=Math.sin(o.wobble)*1.5;
  const pulse=1+Math.sin(o.wobble*1.8)*0.08;
  ctx.translate(o.x, o.y+bob);
  ctx.scale(pulse,pulse);
  // glow halo
  ctx.fillStyle=o.col+'44';
  ctx.beginPath();ctx.arc(0,0,o.r*2.2,0,Math.PI*2);ctx.fill();
  // core
  ctx.fillStyle=o.col;
  ctx.beginPath();ctx.arc(0,0,o.r,0,Math.PI*2);ctx.fill();
  // gem gets a star shape instead
  if(o.tier==='gem'){
    ctx.fillStyle='rgba(255,255,200,0.9)';
    for(let i=0;i<5;i++){
      const a=(Math.PI*2/5)*i-Math.PI/2+o.wobble*0.5;
      const ia=(Math.PI*2/5)*i+Math.PI/10-Math.PI/2+o.wobble*0.5;
      ctx.beginPath();
      ctx.moveTo(0,0);
      ctx.lineTo(Math.cos(a)*o.r*0.9,Math.sin(a)*o.r*0.9);
      ctx.lineTo(Math.cos(ia)*o.r*0.45,Math.sin(ia)*o.r*0.45);
      ctx.closePath();ctx.fill();
    }
    // rotating sparkles
    for(let i=0;i<4;i++){
      const a=o.wobble*2+(Math.PI/2)*i;
      ctx.beginPath();ctx.arc(Math.cos(a)*o.r*1.8,Math.sin(a)*o.r*1.8,1.8,0,Math.PI*2);
      ctx.fillStyle='rgba(255,230,100,0.8)';ctx.fill();
    }
  } else {
    // shine dot
    ctx.fillStyle='rgba(255,255,255,0.6)';
    ctx.beginPath();ctx.arc(-o.r*0.28,-o.r*0.28,o.r*0.28,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}

// ---- PARTICLE DRAW ----
function drawParticle(pt){
  if(pt.type==='wind') return;
  if(pt.type==='bolt'){
    ctx.save();ctx.globalAlpha=pt.life/22;
    ctx.strokeStyle='#FFD700';ctx.lineWidth=2.5;ctx.shadowColor='#FFD700';ctx.shadowBlur=4;
    let lx=pt.fromX||pt.x,ly=pt.fromY||pt.y;
    const steps=6;
    for(let i=0;i<steps;i++){
      const progress=i/steps;
      const tx=lerp(lx,pt.x,progress+1/steps);
      const ty=lerp(ly,pt.y,progress+1/steps);
      const nx=tx+rnd(-12,12),ny=ty+rnd(-8,8);
      ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(nx,ny);ctx.stroke();
      lx=nx;ly=ny;
    }
    ctx.restore();return;
  }
  ctx.save();
  ctx.globalAlpha=Math.max(0,pt.life/38);
  ctx.fillStyle=pt.col;
  ctx.beginPath();ctx.arc(pt.x,pt.y,Math.max(0.5,pt.r*(pt.life/38)),0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawText(t){
  ctx.save();
  ctx.globalAlpha=t.life/40;
  ctx.fillStyle=t.col;
  ctx.font='bold 13px sans-serif';ctx.textAlign='center';
  ctx.fillText(t.txt,t.x,t.y);
  ctx.restore();
}

// ---- JOYSTICK ----
const jZone=document.getElementById('joystickZone');
const jStick=document.getElementById('joystickStick');
jZone.addEventListener('touchstart',e=>{
  e.preventDefault();joy.active=true;
  const r=jZone.getBoundingClientRect();joy.ox=r.left+60;joy.oy=r.top+60;
},{passive:false});
jZone.addEventListener('touchmove',e=>{
  e.preventDefault();if(!joy.active) return;
  const t=e.changedTouches[0];
  let dx=t.clientX-joy.ox,dy=t.clientY-joy.oy;
  const d=Math.sqrt(dx*dx+dy*dy);
  if(d>MAX_JOY){dx=dx/d*MAX_JOY;dy=dy/d*MAX_JOY;}
  joy.dx=dx/MAX_JOY;joy.dy=dy/MAX_JOY;
  jStick.style.transform=`translate(${dx}px,${dy}px)`;
},{passive:false});
['touchend','touchcancel'].forEach(ev=>{
  jZone.addEventListener(ev,e=>{
    e.preventDefault();joy.active=false;joy.dx=0;joy.dy=0;jStick.style.transform='';
  },{passive:false});
});
document.addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  if(e.key==='Escape'||k==='p') togglePause();
  if(e.key==='ArrowLeft' ||k==='a') joy.dx=-1;
  if(e.key==='ArrowRight'||k==='d') joy.dx=1;
  if(e.key==='ArrowUp'   ||k==='w') joy.dy=-1;
  if(e.key==='ArrowDown' ||k==='s') joy.dy=1;
});
document.addEventListener('keyup',e=>{
  const k=e.key.toLowerCase();
  if(e.key==='ArrowLeft' ||k==='a') joy.dx=0;
  if(e.key==='ArrowRight'||k==='d') joy.dx=0;
  if(e.key==='ArrowUp'   ||k==='w') joy.dy=0;
  if(e.key==='ArrowDown' ||k==='s') joy.dy=0;
});
document.getElementById('pauseBtn').addEventListener('click',togglePause);
document.getElementById('pauseBtn').addEventListener('touchend',e=>{e.preventDefault();togglePause();},{passive:false});
document.getElementById('resumeBtn').addEventListener('click',()=>{
  paused=false;document.getElementById('pauseScreen').style.display='none';document.getElementById('pauseBtn').textContent='⏸';
});
document.getElementById('resumeBtn').addEventListener('touchend',e=>{
  e.preventDefault();paused=false;document.getElementById('pauseScreen').style.display='none';document.getElementById('pauseBtn').textContent='⏸';
},{passive:false});

  paused=false;G=null;

  document.getElementById('overlay').style.display='flex';

    <button class="btn" id="startBtn2">▶ Start Game</button>
    <button class="btn" style="background:#1a1a3a;border:1.5px solid #534AB7;" id="lbBtn2">🏆 Leaderboard</button>`;
  document.getElementById('startBtn2').addEventListener('click',()=>{document.getElementById('overlay').style.display='none';newGame();});
  document.getElementById('lbBtn2').addEventListener('click',()=>{
    document.getElementById('overlay').style.display='none';
    showLeaderboard(null);
  });
});
document.getElementById('startBtn').addEventListener('click',()=>{document.getElementById('overlay').style.display='none';newGame();});
document.getElementById('startBtn').addEventListener('touchend',e=>{e.preventDefault();document.getElementById('overlay').style.display='none';newGame();},{passive:false});

document.getElementById('lbBtn').addEventListener('click',()=>{
  document.getElementById('overlay').style.display='none';
  showLeaderboard(null);
});
document.getElementById('lbBtn').addEventListener('touchend',e=>{
  e.preventDefault();
  document.getElementById('overlay').style.display='none';
  showLeaderboard(null);
},{passive:false});

document.getElementById('lbCloseBtn').addEventListener('click',()=>{
  document.getElementById('leaderboardScreen').style.display='none';
  document.getElementById('overlay').style.display='flex';
});
document.getElementById('lbCloseBtn').addEventListener('touchend',e=>{
  e.preventDefault();
  document.getElementById('leaderboardScreen').style.display='none';
  document.getElementById('overlay').style.display='flex';
},{passive:false});


requestAnimationFrame(loop);
